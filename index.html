<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Choose</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ============================================
       INTRO SCREEN — Click to enter & start music
       ============================================ -->
  <div id="intro-screen" class="intro-screen">
    <button id="btn-enter" class="btn-enter" aria-label="Enter">
      <span class="btn-enter__text">Enter</span>
      <span class="btn-enter__line"></span>
    </button>
  </div>

  <!-- Sound effect on enter -->
  <audio id="sfx-enter" preload="auto">
    <source src="assets/sound.mp3" type="audio/mpeg">
  </audio>

  <!-- Voice lines after choice -->
  <audio id="sfx-voice-left" preload="auto">
    <source src="assets/leftvoice.mp3" type="audio/mpeg">
  </audio>
  <audio id="sfx-voice-right" preload="auto">
    <source src="assets/rightvoice.mp3" type="audio/mpeg">
  </audio>

  <!-- Background music -->
  <audio id="bg-music" loop preload="auto">
    <source src="assets/A World Of Madness.mp3" type="audio/mpeg">
  </audio>

  <!-- Film grain overlay -->
  <div class="grain-overlay"></div>

  <!-- Subtle cursor-following light -->
  <div id="cursor-light" class="cursor-light"></div>

  <!-- ============================================
       SCENE 1 — CHOICE
       ============================================ -->
  <main id="scene-choice" class="scene scene--active">

    <p class="tagline">Make your choice</p>

    <!-- ==========================================
         BACKGROUND IMAGE
         This is the main scene image showing both hands.
         REPLACE: assets/bg.png with your full scene image.
         ========================================== -->
    <div class="bg-static">
      <img src="assets/bg.png" alt="Two paws offering pills" class="bg-static__img" draggable="false">
    </div>

    <!-- ==========================================
         PAW OVERLAYS (transparent PNGs)
         These sit on top of the bg and animate on hover.
         REPLACE: assets/paw-left.png & assets/paw-right.png
         Adjust positioning in style.css :root variables.
         ========================================== -->
    <img src="assets/paw-left.png" alt="" class="paw paw--left" id="paw-left" draggable="false">
    <img src="assets/paw-right.png" alt="" class="paw paw--right" id="paw-right" draggable="false">

    <!-- Ambient glow behind each paw -->
    <div class="paw-glow paw-glow--left"></div>
    <div class="paw-glow paw-glow--right"></div>

    <!-- Darken overlay on opposite side (toggled by JS on hover) -->
    <div class="hover-darken hover-darken--right" id="darken-right"></div>
    <div class="hover-darken hover-darken--left" id="darken-left"></div>

    <!-- Click/hover zones positioned over each paw -->
    <div class="hit-zones">
      <div class="hit-zone hit-zone--left" data-choice="left" role="button" tabindex="0" aria-label="Choose left pill"></div>
      <div class="hit-zone hit-zone--right" data-choice="right" role="button" tabindex="0" aria-label="Choose right pill"></div>
    </div>

    <!-- Center divider -->
    <div class="divider"><div class="divider__line"></div></div>

  </main>

  <!-- ============================================
       SCENE 2 — DETAIL (after choice)
       ============================================ -->
  <section id="scene-detail" class="scene scene-detail">

    <div class="detail-content">
      <div class="detail-visual-wrapper">
        <div class="detail-glow"></div>
        <!-- ==========================================
             DETAIL IMAGE
             Set dynamically by JS from CONFIG.
             REPLACE: assets/detail-left.png, assets/detail-right.png
             ========================================== -->
        <img id="detail-img" src="" alt="Selected pill" class="detail__img"
          onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
        <!-- Fallback: cropped view of bg.png if no detail image -->
        <div id="detail-crop" class="detail-crop">
          <img src="assets/bg.png" alt="" class="detail-crop__img" draggable="false">
        </div>
      </div>

      <div class="detail-text">
        <h2 id="detail-title" class="detail-title"></h2>
        <p id="detail-subtitle" class="detail-subtitle"></p>
        <!-- Future CTA button slot -->
        <!-- <a href="#" class="detail-cta">Continue</a> -->
      </div>

      <button id="btn-back" class="btn-back" aria-label="Go back">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M12.5 15L7.5 10L12.5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Back</span>
      </button>
    </div>

  </section>

  <!-- ============================================
       SCENE 3 — RESULTS (after voting)
       ============================================ -->
  <section id="scene-results" class="scene scene-results">

    <!-- Background video -->
    <video class="results-bg-video" muted loop playsinline>
      <source src="assets/background3.mp4" type="video/mp4">
    </video>

    <div class="results-content">

      <p class="results-tagline">The community has spoken</p>

      <!-- Vote bars -->
      <div class="results-bars">

        <!-- Left side -->
        <div class="result-row" id="row-left">
          <div class="result-header">
            <span class="result-label">Left</span>
            <span class="result-pct" id="pct-left">0%</span>
          </div>
          <div class="result-bar-track">
            <div class="result-bar-fill result-bar-fill--left" id="bar-left"></div>
          </div>
        </div>

        <!-- Right side -->
        <div class="result-row" id="row-right">
          <div class="result-header">
            <span class="result-label">Right</span>
            <span class="result-pct" id="pct-right">0%</span>
          </div>
          <div class="result-bar-track">
            <div class="result-bar-fill result-bar-fill--right" id="bar-right"></div>
          </div>
        </div>

      </div>

      <!-- Total votes -->
      <p class="results-total" id="results-total">0 votes</p>

      <!-- User's choice indicator -->
      <p class="results-your-choice" id="results-your-choice"></p>

      <!-- Already voted message (hidden by default) -->
      <p class="results-already" id="results-already" style="display:none;">You have already voted</p>

      <!-- CA display -->
      <div class="ca-box">
        <span class="ca-label">CA :</span>
        <span class="ca-value" id="ca-value"></span>
      </div>

    </div>

  </section>

  <script src="script.js"></script>
</body>
</html>
